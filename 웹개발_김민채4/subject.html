<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>나의 웹 페이지</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    .
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Jua&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&"
    />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <header>
      <h1>
        <span class="material-symbols-outlined"> agriculture </span> 삶이 있는 한
        희망은 있다.
      </h1>
    </header>

    <nav>
      <a href="index.html">홈으로</a>
       <a href="subject.html">전공 탐구</a>
    </nav>
       
    <main>
      <section class="agriculture-portfolio">
        <article class="crop-item">

          <figure class="crop-image">
          <img src="./image/다운로드.jpg"alt="직접 재배한 농작물 사진"/>
          <figcaption>그림1 본인이 직접 재배한 농작물 실물</figcaption>
          </figure>

          <div class="crop-details">
            <h3>농작물 명칭(사과)</h3>

            <section class="info-block">
              <h4>재배 및 생산 특성</h4>
              <ul>
                <li><strong> 품종: </strong>망고</li>
                <li><strong> 재배 환경:시설환경/ 노지재배 등 </strong></li>
              </ul>
            </section>

            <section class="info-block distribution">
              <h4>유통 구조 설계</h4>
              <div class="step-guide">

               <span> 생산자(나)</span>→<span>로컬푸드 직매장</span>→<span> 최종소비자
              </div>
              <ul>
                <li><strong> 물류 방식:</strong> 저온 유통 (Cold Chain)활용 여부 등</li>
                <li><strong> 판매 정략:</strong> 직거래 / 온라인 마켓 등</li>
              </ul>
            </section>
          </div>

        </article>
      </section>
      <section id="order-area"> 
        <hr>
        <h2>온라인 주문하기</h2>
        <form action="">
            <div class="input-row">
              <div class="input-group">
                <label> 주문자 성함</label>
                <input 
                type="text" 
                id="userName" 
                placeholder="실명을 입력하세요">
              </div>

                <div class="input-group">
                <label> 연락처</label>
                <input type="text" id="userPone" placeholder="010-0000-000">
              </div>
              </div>
              

       <div class="input-group">
            <label>배송 방식 선택</label>
            <select>
              <option>일반 택배(3,000원)</option>
              <option>신선 새벽 배송(5,000원)</option>
              <option value="">광주 로컬푸드 매장 픽업(무료)</option>
            </select>
          </div>

            <div class="input-group">
            <label> 배송 메세지</label>
              <textarea 
              name=""
              id=""
              placeholder="부재 시 문 앞에 놓아주세요"
              ></textarea>
          </div>
          

          <button type="button" class="order-btn" onclick="processOrder()">
            바로 주문 완료
          </button>
         <div id="receipt" class="receipt-box">

         </div>

        </form>
      </section>
    </main>

    <footer>minchaee@goedu.kr &copy; all right resevered by 2026 김민채</footer>

    <script>
      function processOrder(){

        let name = document.getElementById('userName').value;
         let phone = document.getElementById('userPone').value;
         let message = document.querySelector('textarea').value;


         if(name==="" || phone ===""){
          alert("성함과 연락처를 모두 입력해 주세요!");
          return;
         } 
         let receipt = document.getElementById('receipt');

         receipt.innerHTML = `
         <h3> 주문 확인 영수증 </h3>
         <p><strong>주문자:</strong>${name}님</p>
         <p><strong>연락처:</strong>${phone}님</p>
         <p><strong>요청사항:</strong>${message || "없음"}</p>
         <hr>
         <p style="text-align:center;"> 주문해주셔서 감사합니다!</p>
         `;
         receipt.style.display="block";
      }
    </script>
  </body>
</html>
