<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>나의 웹 페이지</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    .
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Jua&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&"
    />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <header>
      <h1>
        <span class="material-symbols-outlined"> chef_hat </span> 나의 요리
        <span class="material-symbols-outlined"> skillet </span>
      </h1>
    </header>
    <nav>
      <a href="index.html"
        ><span class="material-symbols-outlined"> home </span>홈으로</a
      >
      <a href="subject.html"
        ><span class="material-symbols-outlined"> search </span>전공 탐구</a
      >
      <a href="gallery.html"
        ><span class="material-symbols-outlined"> add_photo_alternate </span
        >갤러리</a
      >
    </nav>
    <main>
      <div id="login-box" style="text-align: center; margin: 50px">
        <h2>🔒 시스템 인증에 필요합니다</h2>
        <input type="text" id="userdName" placeholder="사용자 이름" /><br />
        <input type="password" id="userPw" placeholder="암호 입력" /><br />
        <button onclick="checkLogin()">입장하기</button>
      </div>

      <!--[Step 2] 인증 후 보호된 콘텐츠 영억-->
      <div id="secret-area" style="display: none">
        <!--⭐ 로그인한 사용자의 이름을 보여줄 공간입니다.-->
        <h3 style="color: 2e7d32">
          <span id="user-display"></span>님, 반갑습니다
        </h3>

        <div class="display-box">
          <img
            id="targetImg"
            src="./image/아.jpg"
            style="width: 100%"
            ;
            max-width:500px;
          />
          <p id="targetDesc">4월7일 : 방울토마토 첫 수확!</p>
        </div>

        <div class="thumb-list">
          <img
            src="./image/아아.jpg"
            onclick="show('./image/아아.jpg', '4월 7일: 방울토마토 첫 수확!')"
          />
          <img
            src="./image/아.jpg"
            onclick="show('./image/아.jpg', '4월 9일: 비료 주기 실습 완료!')"
          />
          <img
            src="./image/토마토1.jpg"
            onclick="
              show(
                './image/토마토1.jpg',
                '오이랑 치즈 토마토 식이섬유가 풍분한 것 같아',
              )
            "
          />
          <img
            src="./image/토마토2.jpg"
            onclick="
              show('./image/토마토2.jpg', '토마토안에 계란후라이 맛있겠다!')
            "
          />
          <img
            src="./image/토마토3.jpg"
            onclick="show('./image/토마토3.jpg', '토마토 파스타는 맛없없!')"
          />
          <img
            src="./image/토마토4.jpg"
            onclick="show('./image/토마토4.jpg', '양파랑 토마토 대박!')"
          />
          <img
            src="./image/토마토5.jpg"
            onclick="show('./image/토마토5.jpg', '영양만점 음식인 것 같아!')"
          />
          <img
            src="./image/토마토6.jpg"
            onclick="
              show('./image/토마토6.jpg', '새로운 조합의 카레인 것 같아!')
            "
          />
          <img
            src="./image/토마토7.jpg"
            onclick="
              show('./image/토마토7.jpg', '토마토랑 스크램블 꼭 먹어봐!')
            "
          />
          <img
            src="./image/토마토92.jpg"
            onclick="
              show(
                './image/토마토92.jpg',
                '토마토 피자 안에 파프리카랑 브로콜리가 들어있어서 더 맛나는 것 같아!!',
              )
            "
          />
          <img
            src="./image/토마토9.jpg"
            onclick="
              show(
                './image/토마토9.jpg',
                '토마토 안에 요거트를 넣어먹으니 상큼해',
              )
            "
          />
          <img
            src="./image/토마토10.jpg"
            onclick="
              show(
                './image/토마토10.jpg',
                '빵이랑 같이 토마토랑 조합이 잘 맞는 것 같아!!',
              )
            "
          />
        </div>
        <div
          id="setting"
          style="
            margin-top: 30px;
            padding: 20px;
            border: 1px solid #ddd;
            background: #fff;
          "
        >
          <h4>🔑 시스템 보안 설정</h4>
          <p style="font-size: 0.9em; color: #666">
            보안을 위해 정기적으로 비밀번호를 변경해 주세요.
          </p>
          <input type="password" id="newPw" placeholder="새 비밀번호 입력" />
          <button onclick="changePassword()">비밀번호 변경</button>
          <button onclick="logout()">로그아웃</button>
        </div>
      </div>
    </main>

    <footer>minchaee@goedu.kr &copy; all right resevered by 2026 김민채</footer>
    <script>
      function show(imgPath, text) {
        document.getElementById("targetImg").src = imgPath;
        document.getElementById("targetDesc").innerText = text;
      }
      function checkLogin() {
        let name = document.getElementById("userdName").value;
        let pw = document.getElementById("userPw").value;

        let currentPw = localStorage.getItem("userPassword") || "1234";

        if (pw === currentPw && name !== "") {
          //[밑바탕 작업] 이름과 상태를 금고(localStage)에 넣습니다.
          localStorage.setItem("isLoggedIn", "true");
          localStorage.setItem("savedName", name);
          localStorage.setItem("userPassword", currentPw);

          alert(name + "님, 인증 정보가 저장소가 기록되었습니다");

          document.getElementById("login-box").style.display = "none";
          document.getElementById("user-display").innerText = "name";
          document.getElementById("secret-area").style.display = "block";
        } else {
          alert("이름을 입력하지 않았거나 암호가 틀렸습니다.");
        }
      }

      window.onload = function () {
        let isLoggendIn = localStorage.getItem("isLoggedIn");

        let savedName = localStorage.getItem("savedName");

        if (isLoggendIn === "true") {
          document.getElementById("login-box").style.display = "none";
          document.getElementById("secret-area").style.display = "block";
          document.getElementById("user-display").innerText = savedName;
        }
      };

      function changePassword() {
        let newPw = document.getElementById("newPw").value;
        if (newPw.length < 4) {
          alert("암호는 4자리 이상이어야 합니다.");
          return;
        }
        localStorage.setItem("userPassword", newPw);
        alert("비밀번호가 변경되었습니다");
      }
      function logout() {
        if (confirm("로그아웃 하시겠습니까?")) {
          localStorage.removeItem("isLoggedIn");
          localStorage.removeItem("savedName");
          location.href = "index.html";
        }
      }
    </script>
  </body>
</html>
